<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC 2026 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3">
            <h2 class="text-xl font-black mb-4 text-amber-400">🏆 Leaderboard</h2>
            <div id="leaderboard" class="glass p-5 rounded-2xl border border-slate-800 h-fit">
                <p class="text-slate-500 text-sm">Syncing data...</p>
            </div>
        </div>

        <div class="lg:col-span-5">
            <h2 class="text-xl font-black mb-4 text-blue-400">⚽ Match Schedule</h2>
            <div id="match-table" class="space-y-3">
                <p class="text-slate-500 text-sm">Fetching matches...</p>
            </div>
        </div>

        <div class="lg:col-span-4">
            <h2 class="text-xl font-black mb-4 text-emerald-400">📊 Team Stats & Odds</h2>
            <div id="stats-table" class="glass p-5 rounded-2xl border border-slate-800 h-[80vh] overflow-y-auto">
                <p class="text-slate-500 text-sm">Loading standings...</p>
            </div>
        </div>
    </div>

    <script>
        const FOOTBALL_KEY = "55a93c4b0f5142c4bfa22b58edbc5177";
        const ODDS_KEY = "0505e1fe83a9649a8048acec4cb62fd7";

        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "United States"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curaçao", "Bosnia-Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czechia", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        let oddsMap = {};

        function normalizeName(name) {
            return String(name || "")
                .toLowerCase()
                .replace(/[^\w\s]/g, "")
                .replace(/\s+/g, " ")
                .trim();
        }

        function buildProxyUrl(targetUrl, reqHeaders = {}) {
            let url = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;
            for (const [key, value] of Object.entries(reqHeaders)) {
                url += `&reqHeaders=${encodeURIComponent(`${key}:${value}`)}`;
            }
            return url;
        }

        function getOwner(teamName) {
            const t = normalizeName(teamName);
            const found = roster.find(p => p.countries.some(c => t.includes(normalizeName(c))));
            return found ? found.name : "Unowned";
        }

        function getOdds(teamName) {
            const n = normalizeName(teamName);

            const aliases = [
                n,
                ...(
                    {
                        "usa": ["united states", "united states of america"],
                        "south korea": ["korea republic", "republic of korea"],
                        "ivory coast": ["cote divoire", "côte divoire", "cote d ivoire"],
                        "congo dr": ["dr congo", "democratic republic of congo", "dem rep congo"],
                        "curacao": ["Curaçao"],
                        "czech republic": ["czechia"],
                        "saudi arabia": [],
                        "bosnia and herzegovina": ["Bosnia-Herzegovina"],
                        "cape verde": [],
                        "new zealand": []
                    }[n] || [])
            ].map(normalizeName);

            for (const [k, v] of Object.entries(oddsMap)) {
                const nk = normalizeName(k);
                if (aliases.some(a => nk === a || nk.includes(a) || a.includes(nk))) return v;
            }

            return "N/A";
        }

        function renderStats(standings) {
            const container = document.getElementById('stats-table');
            container.innerHTML = "";

            if (!standings || !standings.length) {
                container.innerHTML = `<p class="text-slate-500 text-sm">No standings available yet.</p>`;
                return;
            }

            standings.forEach(group => {
                container.innerHTML += `
                    <h3 class="text-xs font-bold text-slate-500 uppercase mt-4 mb-2">
                        ${group.group || "TOTAL"}
                    </h3>
                `;

                group.table.forEach(team => {
                    const teamName = team.team?.name || "Unknown";
                    const owner = getOwner(teamName);
                    const odds = getOdds(teamName);

                    container.innerHTML += `
                        <div class="flex justify-between items-center gap-3 text-sm py-1 border-b border-slate-800/50">
                            <div class="min-w-0">
                                <div class="truncate font-medium">${teamName}</div>
                                <div class="text-[10px] text-amber-500 uppercase font-bold">Owner: ${owner}</div>
                            </div>
                            <div class="flex flex-col items-end gap-0.5 font-mono text-xs whitespace-nowrap">
                                <span class="text-slate-400">P:${team.playedGames ?? 0}</span>
                                <span class="text-emerald-400 font-bold">${team.points ?? 0}pts</span>
                                <span class="text-blue-400">Odds: ${odds}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function renderMatches(matches) {
            const table = document.getElementById('match-table');

            if (!matches || !matches.length) {
                table.innerHTML = `<p class="text-slate-500 text-sm">No matches available yet.</p>`;
                return;
            }

            table.innerHTML = matches.map(m => `
                <div class="glass p-4 rounded-xl flex justify-between items-center border border-slate-800 text-sm">
                    <div class="w-1/3 truncate font-medium text-xs">${m.homeTeam?.name ?? "TBD"}</div>
                    <div class="font-mono font-black bg-slate-950 px-2 py-1 rounded mx-2">
                        ${m.score?.fullTime?.home ?? '-'} : ${m.score?.fullTime?.away ?? '-'}
                    </div>
                    <div class="w-1/3 truncate text-right font-medium text-xs">${m.awayTeam?.name ?? "TBD"}</div>
                </div>
            `).join('');
        }

        function renderLeaderboard(matches) {
            const points = {};
            roster.forEach(r => points[r.name] = 0);

            matches.filter(m => m.status === "FINISHED").forEach(m => {
                const homeTeamName = m.homeTeam?.name || "";
                const awayTeamName = m.awayTeam?.name || "";
                const homeOwner = roster.find(r => r.countries.some(c => normalizeName(homeTeamName).includes(normalizeName(c))))?.name;
                const awayOwner = roster.find(r => r.countries.some(c => normalizeName(awayTeamName).includes(normalizeName(c))))?.name;

                const homeScore = m.score?.fullTime?.home;
                const awayScore = m.score?.fullTime?.away;
                if (homeScore == null || awayScore == null) return;

                if (homeScore > awayScore) {
                    if (homeOwner) points[homeOwner] += 3;
                } else if (awayScore > homeScore) {
                    if (awayOwner) points[awayOwner] += 3;
                } else {
                    if (homeOwner) points[homeOwner] += 1;
                    if (awayOwner) points[awayOwner] += 1;
                }
            });

            const sorted = Object.entries(points).sort((a, b) => b[1] - a[1]);
            document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => `
                <div class="flex justify-between py-2 border-b border-slate-800">
                    <span class="${i < 3 ? 'text-amber-400 font-bold' : ''}">${i + 1}. ${p[0]}</span>
                    <span class="font-bold">${p[1]} pts</span>
                </div>
            `).join('');
        }

        async function init() {
            const proxyHeaders = {
                "Accept": "application/json",
                "X-Auth-Token": FOOTBALL_KEY
            };

            try {
                const oddsURL = `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${ODDS_KEY}&regions=uk&markets=outrights`;
                const resOdds = await fetch(buildProxyUrl(oddsURL));
                const dataOdds = await resOdds.json();

                oddsMap = {};
                const outcomes = dataOdds?.[0]?.bookmakers?.[0]?.markets?.[0]?.outcomes || [];
                outcomes.forEach(o => {
                    oddsMap[normalizeName(o.name)] = o.price;
                });
            } catch (e) {
                console.log("odds fail", e);
            }

            try {
                const matchesURL = "https://api.football-data.org/v4/competitions/WC/matches";
                const resMatches = await fetch(buildProxyUrl(matchesURL, proxyHeaders));
                const dataMatches = await resMatches.json();

                renderMatches(dataMatches.matches || []);
                renderLeaderboard(dataMatches.matches || []);
            } catch (e) {
                document.getElementById('match-table').innerHTML = "Error loading matches.";
            }

            try {
                const standingsURL = "https://api.football-data.org/v4/competitions/WC/standings";
                const resStats = await fetch(buildProxyUrl(standingsURL, proxyHeaders));
                const dataStats = await resStats.json();

                renderStats(dataStats.standings || []);
            } catch (e) {
                document.getElementById('stats-table').innerHTML = "No stats available yet.";
            }
        }

        init();
    </script>
</body>
</html>

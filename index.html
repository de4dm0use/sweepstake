<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Sweepstakes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">

    <header class="bg-slate-800 border-b border-slate-700 py-6 px-4 shadow-xl mb-8">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-amber-400">🏆 SWEEPSTAKES DASHBOARD</h1>
                <p class="text-slate-400 text-sm mt-1">Live calculations for Archie, Liam, Alex, and crew</p>
            </div>
            <div class="bg-slate-900 px-4 py-2 rounded-xl border border-slate-700 text-xs font-mono text-slate-400">
                Status: <span class="text-emerald-400 font-bold">● Local Storage Active</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-md h-fit">
            <h2 class="text-xl font-bold mb-4 text-slate-100 border-b border-slate-700 pb-2 flex items-center justify-between">
                <span>📊 Live Standings</span>
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="pb-3 font-semibold w-12">Rank</th>
                            <th class="pb-3 font-semibold">Player</th>
                            <th class="pb-3 font-semibold text-right">Points</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-700/50">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-md">
                <h2 class="text-xl font-bold mb-4 text-amber-400 flex items-center gap-2">
                    ⚽ Record a Match Result
                </h2>
                <form id="match-form" onsubmit="addMatch(event)" class="grid grid-cols-1 sm:grid-cols-7 gap-4 items-end">
                    
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-semibold text-slate-400 mb-1">Team A</label>
                        <select id="teamA" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-sm text-slate-200 outline-none focus:border-amber-400" required>
                            </select>
                    </div>

                    <div class="sm:col-span-1">
                        <label class="block text-xs font-semibold text-slate-400 mb-1 text-center">Score A</label>
                        <input type="number" id="scoreA" min="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-center text-sm font-bold text-amber-400 outline-none focus:border-amber-400" required>
                    </div>

                    <div class="sm:col-span-1 flex justify-center items-center h-10 font-bold text-slate-500">
                        VS
                    </div>

                    <div class="sm:col-span-1">
                        <label class="block text-xs font-semibold text-slate-400 mb-1 text-center">Score B</label>
                        <input type="number" id="scoreB" min="0" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-center text-sm font-bold text-amber-400 outline-none focus:border-amber-400" required>
                    </div>

                    <div class="sm:col-span-2">
                        <label class="block text-xs font-semibold text-slate-400 mb-1">Team B</label>
                        <select id="teamB" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-sm text-slate-200 outline-none focus:border-amber-400" required>
                            </select>
                    </div>

                    <div class="sm:col-span-7 mt-2">
                        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 rounded-xl transition shadow cursor-pointer text-sm">
                            Submit Match Result
                        </button>
                    </div>
                </form>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between border-b border-slate-700 pb-2">
                    <h2 class="text-xl font-bold text-slate-100">📅 Match Timeline History</h2>
                    <button onclick="clearAllMatches()" class="text-xs text-rose-400 hover:underline cursor-pointer">Reset Dashboard Data</button>
                </div>
                <div id="fixtures-container" class="space-y-3">
                    </div>
            </div>

        </div>
    </main>

    <script>
        // Complete data mapping of your pool roster details
        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Halifax", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curaçao", "Bosnia", "Paraguay"] },
            { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        // Gather alphabetical list of all unique countries across the entire sweepstakes pool
        let uniqueCountries = [];
        roster.forEach(player => {
            player.countries.forEach(c => {
                if(!uniqueCountries.includes(c)) uniqueCountries.push(c);
            });
        });
        uniqueCountries.sort();

        // Load previously entered matches from local storage data array
        let matches = JSON.parse(localStorage.getItem('sweepstakes_matches_v2')) || [];

        document.addEventListener("DOMContentLoaded", () => {
            populateCountryDropdowns();
            renderDashboard();
        });

        // Initialize lists inside selector inputs
        function populateCountryDropdowns() {
            const selectA = document.getElementById('teamA');
            const selectB = document.getElementById('teamB');
            
            let optionsHTML = `<option value="" disabled selected>Choose Country...</option>`;
            uniqueCountries.forEach(country => {
                optionsHTML += `<option value="${country}">${country}</option>`;
            });

            selectA.innerHTML = optionsHTML;
            selectB.innerHTML = optionsHTML;
        }

        // Add a recorded match to persistent data store arrays
        function addMatch(event) {
            event.preventDefault();
            const tA = document.getElementById('teamA').value;
            const tB = document.getElementById('teamB').value;
            const sA = parseInt(document.getElementById('scoreA').value, 10);
            const sB = parseInt(document.getElementById('scoreB').value, 10);

            if (tA === tB) {
                alert("A country cannot play against itself. Please check entries.");
                return;
            }

            const newMatch = {
                id: Date.now(),
                teamA: tA,
                teamB: tB,
                scoreA: sA,
                scoreB: sB,
                timestamp: new Date().toLocaleDateString()
            };

            matches.unshift(newMatch); // Put latest match at top
            localStorage.setItem('sweepstakes_matches_v2', JSON.stringify(matches));
            
            // Reset form input visuals
            document.getElementById('match-form').reset();
            populateCountryDropdowns();
            renderDashboard();
        }

        // Delete individual match entry item from record index mapping
        function deleteMatch(matchId) {
            matches = matches.filter(m => m.id !== matchId);
            localStorage.setItem('sweepstakes_matches_v2', JSON.stringify(matches));
            renderDashboard();
        }

        function clearAllMatches() {
            if(confirm("Are you sure you want to completely wipe all recorded match history data?")) {
                matches = [];
                localStorage.removeItem('sweepstakes_matches_v2');
                renderDashboard();
            }
        }

        // Helper function to figure out who owns a country
        function getOwner(countryName) {
            const match = roster.find(player => player.countries.includes(countryName));
            return match ? match.name : "Unowned";
        }

        // Engine parsing math scores to draw live standings blocks UI
        function renderDashboard() {
            // Setup base object ledger configurations
            let pointsLedger = {};
            roster.forEach(p => pointsLedger[p.name] = 0);

            // Compute math elements from historical array loops
            matches.forEach(m => {
                const ownerA = getOwner(m.teamA);
                const ownerB = getOwner(m.teamB);

                if (m.scoreA > m.scoreB) {
                    if(ownerA !== "Unowned") pointsLedger[ownerA] += 3;
                } else if (m.scoreB > m.scoreA) {
                    if(ownerB !== "Unowned") pointsLedger[ownerB] += 3;
                } else {
                    if(ownerA !== "Unowned") pointsLedger[ownerA] += 1;
                    if(ownerB !== "Unowned") pointsLedger[ownerB] += 1;
                }
            });

            // Map and sort leader array layout
            let leaderboard = roster.map(p => ({
                name: p.name,
                countries: p.countries.join(', '),
                points: pointsLedger[p.name]
            })).sort((x, y) => y.points - x.points);

            // Print table elements matching calculation indices
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            leaderboard.forEach((row, idx) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-750/30 transition">
                        <td class="py-3.5 text-amber-500 font-mono font-bold text-center">#${idx+1}</td>
                        <td class="py-3.5 pr-2">
                            <div class="font-bold text-slate-200">${row.name}</div>
                            <div class="text-[11px] text-slate-400 tracking-tight max-w-[180px] sm:max-w-none truncate">${row.countries}</div>
                        </td>
                        <td class="py-3.5 font-black text-right text-base text-slate-100">${row.points} <span class="text-xs font-normal text-slate-500">pts</span></td>
                    </tr>
                `;
            });

            // Build dynamic display stream layout for match records log boxes
            const fixturesContainer = document.getElementById('fixtures-container');
            fixturesContainer.innerHTML = '';

            if (matches.length === 0) {
                fixturesContainer.innerHTML = `
                    <div class="bg-slate-800 rounded-xl p-8 border border-slate-700 text-center text-slate-400 text-sm">
                        No matches recorded yet. Enter a score above to update the pool board!
                    </div>
                `;
                return;
            }

            matches.forEach(m => {
                fixturesContainer.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm relative group">
                        <div class="text-center sm:text-left">
                            <span class="text-[10px] font-bold tracking-wider uppercase px-2 py-0.5 rounded bg-slate-700 text-slate-300">FT Result</span>
                            <p class="text-[11px] text-slate-500 mt-1 font-mono">${m.timestamp}</p>
                        </div>
                        
                        <div class="flex items-center gap-4 justify-center flex-1 max-w-lg w-full">
                            <div class="text-right flex-1 min-w-[90px]">
                                <p class="font-bold text-slate-100 text-sm truncate">${m.teamA}</p>
                                <span class="text-[10px] bg-slate-900/60 text-slate-400 px-1.5 py-0.5 rounded">👤 ${getOwner(m.teamA)}</span>
                            </div>
                            
                            <div class="bg-slate-900 border border-slate-700 font-mono font-black px-3 py-1.5 rounded-xl text-amber-400 tracking-widest text-sm min-w-[70px] text-center shadow-inner">
                                ${m.scoreA}:${m.scoreB}
                            </div>
                            
                            <div class="text-left flex-1 min-w-[90px]">
                                <p class="font-bold text-slate-100 text-sm truncate">${m.teamB}</p>
                                <span class="text-[10px] bg-slate-900/60 text-slate-400 px-1.5 py-0.5 rounded">👤 ${getOwner(m.teamB)}</span>
                            </div>
                        </div>

                        <div>
                            <button onclick="deleteMatch(${m.id})" class="text-xs text-slate-500 hover:text-rose-400 transition p-1 cursor-pointer" title="Delete entry">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>

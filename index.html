<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Sports Lookup</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: #0f172a;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            min-height: 100px;
            text-align: left;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .team-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .badge {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .team-card h2 {
            margin: 0 0 10px 0;
            color: var(--text-color);
        }

        .team-card p {
            margin: 5px 0;
            color: #cbd5e1;
        }

        .desc {
            font-size: 0.85rem;
            color: #94a3b8 !important;
            margin-top: 15px !important;
            line-height: 1.5;
        }

        .loading {
            color: var(--accent-color);
            text-align: center;
            font-weight: 500;
        }

        .error {
            color: #f87171;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 Sports Team Lookup</h1>
        <p class="subtitle">GitHub Pages HTTPS-Compatible Edition</p>

        <div class="search-box">
            <input type="text" id="teamId" placeholder="Enter Team ID (e.g., 133604 for Arsenal)" value="133604">
            <button onclick="lookupTeam()">Search</button>
        </div>

        <div id="output" class="result-box">
            <p style="text-align: center; color: #64748b;">Enter a valid ID and click search.</p>
        </div>
    </div>

    <script>
        async function lookupTeam() {
            const id = document.getElementById('teamId').value.trim();
            const output = document.getElementById('output');
            
            if (!id) {
                output.innerHTML = "<p class='error'>Please enter a Team ID string.</p>";
                return;
            }

            output.innerHTML = "<p class='loading'>Bypassing CORS constraints via secure proxy...</p>";

            // 1. Target URL
            const apiUrl = `https://www.thesportsdb.com/api/v1/json/123/lookupteam.php?id=${id}`;
            
            // 2. AllOrigins CORS Proxy (HTTPS strict match for GitHub Pages)
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy transport layer failure.");

                const wrappedData = await response.json();
                
                // AllOrigins embeds the stringified server response into the '.contents' property
                if (!wrappedData.contents) throw new Error("Empty payload returned.");
                
                const data = JSON.parse(wrappedData.contents);

                if (data.teams && data.teams.length > 0) {
                    const team = data.teams[0];
                    output.innerHTML = `
                        <div class="team-card">
                            <img src="${team.strTeamBadge}" alt="Team Badge" class="badge">
                            <h2>${team.strTeam}</h2>
                            <p><strong>League:</strong> ${team.strLeague}</p>
                            <p><strong>Stadium:</strong> ${team.strStadium} (${team.strStadiumLocation || 'Unknown Location'})</p>
                            <p class="desc">${team.strDescriptionEN ? team.strDescriptionEN.substring(0, 180) + '...' : 'No English summary available.'}</p>
                        </div>
                    `;
                } else {
                    output.innerHTML = "<p class='error'>No matching data found. Note: Free key '123' only permits select lookups like Arsenal (133604).</p>";
                }
            } catch (error) {
                console.error("Execution context exception:", error);
                output.innerHTML = `
                    <div class="error">
                        <p><strong>Network Request Blocked</strong></p>
                        <p style="font-size:0.85rem; color:#fca5a5;">Ensure your repository environment serves valid secure contexts. Check browser debugger console (F12) for detailed trace logs.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

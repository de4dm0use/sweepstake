<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
</style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

<div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">

    <div class="lg:col-span-3">
        <h2 class="text-xl font-black mb-4 text-amber-400">🏆 Leaderboard</h2>
        <div id="leaderboard" class="glass p-5 rounded-2xl border border-slate-800"></div>
    </div>

    <div class="lg:col-span-5">
        <h2 class="text-xl font-black mb-4 text-blue-400">⚽ Match Schedule</h2>
        <div id="match-table" class="space-y-3"></div>
    </div>

    <div class="lg:col-span-4">
        <h2 class="text-xl font-black mb-4 text-emerald-400">📊 Team Stats</h2>
        <div id="stats-table" class="glass p-5 rounded-2xl border border-slate-800 h-[80vh] overflow-y-auto"></div>
    </div>

</div>

<script>
const FOOTBALL_KEY = "55a93c4b0f5142c4bfa22b58edbc5177";
const ODDS_KEY = "0505e1fe83a9649a8048acec4cb62fd7";

const proxy = "https://corsproxy.io/?";

let oddsMap = {};

/* ---------------- ROSTER ---------------- */
const roster = [
    { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
    { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
    { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
    { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
    { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
    { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
    { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
    { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
    { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
    { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
    { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
    { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
    { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
    { name: "Edwyn", countries: ["Curacao", "Bosnia and Herzegovina", "Paraguay"] },
    { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
    { name: "Joel", countries: ["England", "Spain", "Austria"] }
];

/* ---------------- NORMALISE ---------------- */
function normalize(n) {
    return String(n || "")
        .toLowerCase()
        .replace(/[^\w\s]/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

/* ---------------- ODDS ---------------- */
function getOdds(team) {
    const t = normalize(team);

    if (oddsMap[t]) return oddsMap[t];

    for (const k of Object.keys(oddsMap)) {
        if (k.includes(t) || t.includes(k)) {
            return oddsMap[k];
        }
    }

    return "N/A";
}

/* ---------------- OWNER ---------------- */
function getOwner(team) {
    const t = normalize(team);
    const found = roster.find(p =>
        p.countries.some(c => t.includes(normalize(c)))
    );
    return found ? found.name : "Unowned";
}

/* ---------------- MATCHES ---------------- */
function renderMatches(matches) {
    const el = document.getElementById("match-table");

    if (!matches?.length) {
        el.innerHTML = "<p class='text-slate-500'>No matches</p>";
        return;
    }

    el.innerHTML = matches.map(m => `
        <div class="glass p-4 rounded-xl flex justify-between border border-slate-800 text-sm">
            <div class="w-1/3 truncate">${m.homeTeam?.name}</div>
            <div class="font-mono">
                ${m.score?.fullTime?.home ?? "-"} : ${m.score?.fullTime?.away ?? "-"}
            </div>
            <div class="w-1/3 text-right truncate">${m.awayTeam?.name}</div>
        </div>
    `).join("");
}

/* ---------------- LEADERBOARD ---------------- */
function renderLeaderboard(matches) {
    let points = {};
    roster.forEach(r => points[r.name] = 0);

    matches.filter(m => m.status === "FINISHED").forEach(m => {
        const h = roster.find(r =>
            r.countries.some(c => normalize(m.homeTeam?.name).includes(normalize(c)))
        )?.name;

        const a = roster.find(r =>
            r.countries.some(c => normalize(m.awayTeam?.name).includes(normalize(c)))
        )?.name;

        const hs = m.score?.fullTime?.home;
        const as = m.score?.fullTime?.away;

        if (hs == null || as == null) return;

        if (hs > as && h) points[h] += 3;
        else if (as > hs && a) points[a] += 3;
        else {
            if (h) points[h] += 1;
            if (a) points[a] += 1;
        }
    });

    document.getElementById("leaderboard").innerHTML =
        Object.entries(points)
            .sort((a,b)=>b[1]-a[1])
            .map((p,i)=>`
                <div class="flex justify-between border-b border-slate-800 py-2">
                    <span class="${i<3?'text-amber-400 font-bold':''}">
                        ${i+1}. ${p[0]}
                    </span>
                    <span>${p[1]} pts</span>
                </div>
            `).join("");
}

/* ---------------- STATS ---------------- */
function renderStats(standings) {
    const el = document.getElementById("stats-table");
    el.innerHTML = "";

    if (!standings?.length) {
        el.innerHTML = "<p class='text-slate-500'>No stats</p>";
        return;
    }

    standings.forEach(group => {
        el.innerHTML += `<h3 class="text-xs text-slate-500 mt-4">${group.group}</h3>`;

        group.table.forEach(team => {
            const name = team.team.name;

            el.innerHTML += `
                <div class="flex justify-between text-sm py-1 border-b border-slate-800/50">
                    <div class="truncate w-1/2">
                        ${name}
                        <div class="text-[10px] text-amber-500">
                            ${getOwner(name)}
                        </div>
                    </div>
                    <div class="text-right text-xs font-mono">
                        <div class="text-slate-400">P:${team.playedGames}</div>
                        <div class="text-emerald-400">${team.points}pts</div>
                    </div>
                </div>
            `;
        });
    });
}

/* ---------------- INIT ---------------- */
async function init() {
    try {

        // ODDS (proxy only)
        const oddsURL =
            `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${ODDS_KEY}&regions=uk&markets=outrights`;

        const o = await fetch(proxy + oddsURL);
        const data = await o.json();

        oddsMap = {};
        const outcomes = data?.[0]?.bookmakers?.[0]?.markets?.[0]?.outcomes || [];

        outcomes.forEach(x => {
            oddsMap[normalize(x.name)] = x.price;
        });

        // MATCHES (direct)
        const m = await fetch(
            "https://api.football-data.org/v4/competitions/WC/matches",
            { headers: { "X-Auth-Token": FOOTBALL_KEY } }
        );
        const md = await m.json();

        renderMatches(md.matches || []);
        renderLeaderboard(md.matches || []);

        // STANDINGS (direct)
        const s = await fetch(
            "https://api.football-data.org/v4/competitions/WC/standings",
            { headers: { "X-Auth-Token": FOOTBALL_KEY } }
        );
        const sd = await s.json();

        renderStats(sd.standings || []);

    } catch (e) {
        console.log("error", e);
    }
}

init();
</script>

</body>
</html>

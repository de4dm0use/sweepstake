<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC 2026 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3">
            <h2 class="text-xl font-black mb-4 text-amber-400">🏆 Leaderboard</h2>
            <div id="leaderboard" class="glass p-5 rounded-2xl border border-slate-800 h-fit"></div>
        </div>

        <div class="lg:col-span-5">
            <h2 class="text-xl font-black mb-4 text-blue-400">⚽ Match Schedule</h2>
            <div id="match-table" class="space-y-3"></div>
        </div>

        <div class="lg:col-span-4">
            <h2 class="text-xl font-black mb-4 text-emerald-400">📊 Team Ownership & Odds</h2>
            <div id="stats-table" class="glass p-5 rounded-2xl border border-slate-800 h-[80vh] overflow-y-auto space-y-4">
                <p class="text-slate-500 text-sm">Loading stats...</p>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "0505e1fe83a9649a8048acec4cb62fd7"; 
        
        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curacao", "Bosnia and Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        let tournamentOdds = {};

        async function init() {
            const proxy = "https://corsproxy.io/?";

            // 1. Fetch Odds (Outrights)
            try {
                const oddsUrl = `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${API_KEY}&regions=uk&markets=outrights`;
                const resOdds = await fetch(proxy + encodeURIComponent(oddsUrl));
                const dataOdds = await resOdds.json();
                
                // Process odds (simplified mapping)
                if(dataOdds[0]) {
                    dataOdds[0].bookmakers[0].markets[0].outcomes.forEach(o => {
                        tournamentOdds[o.name.toLowerCase()] = o.price;
                    });
                }
            } catch (e) { console.error("Odds fetch failed", e); }

            // 2. Fetch Standings & Matches
            try {
                const resMatches = await fetch(proxy + "https://api.football-data.org/v4/competitions/WC/matches");
                const dataMatches = await resMatches.json();
                renderMatches(dataMatches.matches);
                renderLeaderboard(dataMatches.matches);

                const resStats = await fetch(proxy + "https://api.football-data.org/v4/competitions/WC/standings");
                const dataStats = await resStats.json();
                renderStats(dataStats.standings);
            } catch (e) { console.error("Stats/Matches fetch failed", e); }
        }

        function renderStats(standings) {
            const container = document.getElementById('stats-table');
            container.innerHTML = "";
            if (!standings) return;
            
            standings.forEach(group => {
                container.innerHTML += `<h3 class="text-xs font-bold text-slate-500 uppercase border-b border-slate-800 pb-1">${group.group}</h3>`;
                group.table.forEach(team => {
                    const owner = roster.find(p => p.countries.some(c => team.team.name.toLowerCase().includes(c.toLowerCase())))?.name || "Unowned";
                    // Match Odds (Fallback to N/A)
                    const odds = tournamentOdds[team.team.name.toLowerCase()] || "N/A";
                    
                    container.innerHTML += `
                        <div class="flex justify-between items-center py-2 border-b border-slate-800/50">
                            <div>
                                <div class="text-sm font-medium">${team.team.name}</div>
                                <div class="text-[9px] uppercase tracking-wider text-amber-500 font-bold">Owner: ${owner}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-slate-400 font-mono">${team.points} pts</div>
                                <div class="text-[10px] text-emerald-400 font-bold">Win Odds: ${odds}</div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // ... (renderMatches and renderLeaderboard functions remain the same) ...
        init();
    </script>
</body>
</html>

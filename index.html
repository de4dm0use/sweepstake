<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Sweepstakes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12 font-sans">
    
    <!-- UI Header -->
    <header class="bg-slate-800 border-b border-slate-700 py-6 px-4 shadow-xl mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-amber-400">🏆 2026 WORLD CUP SWEEPSTAKES</h1>
                <p class="text-slate-400 text-sm mt-1">Live updates via API-Football</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                <!-- Secure API Key Input -->
                <div class="relative">
                    <input type="password" id="api-key-input" placeholder="Paste API Key here..." 
                           class="bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-amber-400 text-slate-200 w-full sm:w-48 text-center" />
                </div>
                
                <button onclick="fetchLiveScores()" id="sync-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition flex items-center justify-center gap-2 whitespace-nowrap">
                    🔄 Sync Live Scores
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Leaderboard Column -->
        <div class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-md h-fit">
            <h2 class="text-xl font-bold mb-4 text-slate-100 border-b border-slate-700 pb-2">📊 Live Standings</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="pb-3 font-semibold">Player</th>
                            <th class="pb-3 font-semibold text-right">Points</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-700/50">
                        <tr><td colspan="2" class="py-4 text-center text-slate-500">Enter your API key and click Sync...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Fixtures Column -->
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-xl font-bold text-slate-100 border-b border-slate-700 pb-2">📅 Match Results Log</h2>
            <div id="fixtures-container" class="space-y-3">
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-8 text-center text-slate-400">
                    Waiting for sync...
                </div>
            </div>
        </div>
    </main>

    <script>
        // Country rosters matched exactly against official API-Football names
        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
            { name: "Christopher", countries: ["Colombia", "Turkiye", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Cote d'Ivoire"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", ["South Africa", "France", "DR Congo"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curacao", "Bosnia-Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czechia", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        // Load saved API Key on page open
        document.getElementById('api-key-input').value = localStorage.getItem('api_football_key') || '';

        function getOwner(countryName) {
            const match = roster.find(player => player.countries.includes(countryName));
            return match ? match.name : "Unowned";
        }

        async function fetchLiveScores() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) {
                alert("Please paste your API-Football key first!");
                return;
            }

            // Save key to local storage so they don't have to keep re-typing it
            localStorage.setItem('api_football_key', apiKey);

            const btn = document.getElementById('sync-btn');
            btn.innerHTML = "⏳ Syncing...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // API-Football Endpoint: League 1 = World Cup, Season 2026
                const response = await fetch("https://v3.football.api-sports.io/fixtures?league=1&season=2026", {
                    method: "GET",
                    headers: {
                        "x-apisports-key": apiKey
                    }
                });

                if (!response.ok) throw new Error("API network response failed");
                const data = await response.json();

                if (data.errors && Object.keys(data.errors).length > 0) {
                    throw new Error(JSON.stringify(data.errors));
                }

                const fixtures = data.response;
                if (!fixtures || fixtures.length === 0) {
                    alert("Connected, but no fixtures found for the 2026 World Cup yet.");
                    resetButton(btn);
                    return;
                }

                processFixtures(fixtures);

            } catch (error) {
                console.error(error);
                alert("Failed to sync. Please check your API key or console logs.");
            }
            
            resetButton(btn);
        }

        function resetButton(btn) {
            btn.innerHTML = "🔄 Sync Live Scores";
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function processFixtures(fixtures) {
            let pointsLedger = {};
            roster.forEach(p => pointsLedger[p.name] = 0);
            
            let finishedMatchesHTML = "";

            // Sort fixtures chronologically
            fixtures.sort((a, b) => new Date(a.fixture.date) - new Date(b.fixture.date));

            fixtures.forEach(item => {
                const teamA = item.teams.home.name;
                const teamB = item.teams.away.name;
                
                const scoreA = item.goals.home;
                const scoreB = item.goals.away;

                const ownerA = getOwner(teamA);
                const ownerB = getOwner(teamB);
                
                const status = item.fixture.status.short;
                // Match is considered finished if status is FT (Full Time), AET, or PEN
                const isFinished = ["FT", "AET", "PEN"].includes(status);

                if (isFinished && scoreA !== null && scoreB !== null) {
                    if (scoreA > scoreB) {
                        if (ownerA !== "Unowned") pointsLedger[ownerA] += 3;
                    } else if (scoreB > scoreA) {
                        if (ownerB !== "Unowned") pointsLedger[ownerB] += 3;
                    } else {
                        if (ownerA !== "Unowned") pointsLedger[ownerA] += 1;
                        if (ownerB !== "Unowned") pointsLedger[ownerB] += 1;
                    }

                    finishedMatchesHTML += `
                        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex items-center justify-between shadow-sm hover:bg-slate-750 transition">
                            <div class="text-right flex-1 min-w-[90px]">
                                <p class="font-bold text-slate-100 text-sm sm:text-base">${teamA}</p>
                                <span class="text-[10px] bg-slate-900/60 text-slate-400 px-1.5 py-0.5 rounded">👤 ${ownerA}</span>
                            </div>
                            <div class="bg-slate-900 border border-slate-700 font-mono font-black px-4 py-2 mx-4 rounded-xl text-amber-400 shadow-inner text-sm sm:text-base whitespace-nowrap">
                                ${scoreA} : ${scoreB}
                            </div>
                            <div class="text-left flex-1 min-w-[90px]">
                                <p class="font-bold text-slate-100 text-sm sm:text-base">${teamB}</p>
                                <span class="text-[10px] bg-slate-900/60 text-slate-400 px-1.5 py-0.5 rounded">👤 ${ownerB}</span>
                            </div>
                        </div>
                    `;
                }
            });

            if (finishedMatchesHTML === "") {
                finishedMatchesHTML = `<div class="p-8 text-center text-slate-400 bg-slate-800 border border-slate-700 rounded-xl">No completed matches found yet. Check back once the tournament matches wrap up!</div>`;
            }

            document.getElementById('fixtures-container').innerHTML = finishedMatchesHTML;

            // Generate leaderboard array
            let leaderboard = roster.map(p => ({
                name: p.name,
                points: pointsLedger[p.name]
            })).sort((x, y) => y.points - x.points);

            // Render leaderboard
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            leaderboard.forEach((row, idx) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-750/30 transition">
                        <td class="py-3.5 pr-2">
                            <span class="text-amber-500 font-mono font-bold w-6 inline-block text-right mr-2">${idx+1}.</span>
                            <span class="font-bold text-slate-200">${row.name}</span>
                        </td>
                        <td class="py-3.5 font-black text-right text-slate-100 text-lg">${row.points} <span class="text-xs text-slate-500 font-normal">pts</span></td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>

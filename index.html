<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Sweepstakes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">
    
    <header class="bg-slate-800 border-b border-slate-700 py-6 px-4 shadow-xl mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-amber-400">🏆 2026 WORLD CUP SWEEPSTAKES</h1>
                <p class="text-slate-400 text-sm mt-1">Live updates via football-data.org</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
                <input type="password" id="api-key-input" placeholder="Paste Auth Token here..." 
                       class="bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-amber-400 text-slate-200 w-full sm:w-48 text-center" />
                
                <button onclick="fetchLiveScores()" id="sync-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-6 rounded-xl shadow-lg transition flex items-center justify-center gap-2 cursor-pointer">
                    🔄 Sync Live Scores
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-md h-fit">
            <h2 class="text-xl font-bold mb-4 text-slate-100 border-b border-slate-700 pb-2">📊 Live Standings</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="leaderboard-body" class="divide-y divide-slate-700/50">
                        <tr><td class="py-6 text-center text-slate-500">Enter token & click Sync...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-xl font-bold text-slate-100 border-b border-slate-700 pb-2">📅 Match Results Log</h2>
            <div id="fixtures-container" class="space-y-3">
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-8 text-center text-slate-400">
                    Waiting for data sync...
                </div>
            </div>
        </div>
    </main>

    <script>
        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curacao", "Bosnia and Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('api-key-input').value = localStorage.getItem('fd_token') || '';
        });

        function getOwner(countryName) {
            // Simple cleanup to match API names better
            const match = roster.find(player => player.countries.some(c => countryName.includes(c) || c.includes(countryName)));
            return match ? match.name : "Unowned";
        }

        async function fetchLiveScores() {
            const token = document.getElementById('api-key-input').value.trim();
            if (!token) { alert("Please paste your API Token!"); return; }
            localStorage.setItem('fd_token', token);

            const btn = document.getElementById('sync-btn');
            btn.innerHTML = "⏳ Syncing...";

            try {
                // Fetching World Cup Matches
                const response = await fetch("https://api.football-data.org/v4/competitions/WC/matches", {
                    headers: { "X-Auth-Token": token }
                });

                if (!response.ok) throw new Error("API error: " + response.statusText);
                const data = await response.json();
                processMatches(data.matches);
            } catch (err) {
                console.error(err);
                alert("Failed to sync. Ensure your token is correct.");
            }
            btn.innerHTML = "🔄 Sync Live Scores";
        }

        function processMatches(matches) {
            let points = {};
            roster.forEach(p => points[p.name] = 0);
            let html = "";

            matches.forEach(m => {
                if (m.status !== "FINISHED") return; // Only count finished games

                const teamA = m.homeTeam.name;
                const teamB = m.awayTeam.name;
                const sA = m.score.fullTime.home;
                const sB = m.score.fullTime.away;
                
                const ownerA = getOwner(teamA);
                const ownerB = getOwner(teamB);

                if (sA > sB) points[ownerA] += 3;
                else if (sB > sA) points[ownerB] += 3;
                else { points[ownerA] += 1; points[ownerB] += 1; }

                html += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex items-center justify-between">
                        <div class="text-right flex-1"><p class="font-bold">${teamA}</p><span class="text-[10px] text-slate-500">${ownerA}</span></div>
                        <div class="font-mono bg-slate-900 px-4 py-2 rounded-xl mx-4">${sA} : ${sB}</div>
                        <div class="text-left flex-1"><p class="font-bold">${teamB}</p><span class="text-[10px] text-slate-500">${ownerB}</span></div>
                    </div>
                `;
            });

            document.getElementById('fixtures-container').innerHTML = html || '<p class="text-center p-8">No finished matches yet.</p>';
            
            // Leaderboard
            const sorted = Object.entries(points).sort((a,b) => b[1] - a[1]);
            document.getElementById('leaderboard-body').innerHTML = sorted.map((row, i) => `
                <tr class="hover:bg-slate-700/20">
                    <td class="py-3 px-2 font-bold">${i+1}. ${row[0]}</td>
                    <td class="py-3 px-2 text-right font-black text-amber-400">${row[1]} pts</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WC 2026 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3">
            <h2 class="text-xl font-black mb-4 text-amber-400">🏆 Leaderboard</h2>
            <div id="leaderboard" class="glass p-5 rounded-2xl border border-slate-800 h-fit">
                <p class="text-slate-500 text-sm">Syncing data...</p>
            </div>
        </div>

        <div class="lg:col-span-5">
            <h2 class="text-xl font-black mb-4 text-blue-400">⚽ Match Schedule</h2>
            <div id="match-table" class="space-y-3">
                <p class="text-slate-500 text-sm">Fetching matches...</p>
            </div>
        </div>

        <div class="lg:col-span-4">
            <h2 class="text-xl font-black mb-4 text-emerald-400">📊 Team Stats & Odds</h2>
            <div id="stats-table" class="glass p-5 rounded-2xl border border-slate-800 h-[80vh] overflow-y-auto">
                <p class="text-slate-500 text-sm">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const FOOTBALL_KEY = "55a93c4b0f5142c4bfa22b58edbc5177";
        
        // Hardcoded decimal equivalents of your fractional odds
        const oddsMap = {
            "france": 5.5, "spain": 5.5, "england": 7.5, "brazil": 9.0, "portugal": 10.0,
            "argentina": 11.0, "germany": 13.0, "netherlands": 15.0, "belgium": 21.0,
            "norway": 34.0, "colombia": 41.0, "japan": 51.0, "usa": 67.0, "uruguay": 67.0,
            "morocco": 67.0, "croatia": 81.0, "mexico": 81.0, "switzerland": 81.0,
            "turkiye": 101.0, "austria": 101.0, "ecuador": 101.0, "senegal": 151.0,
            "canada": 151.0, "ivory coast": 151.0, "sweden": 151.0, "ghana": 251.0,
            "paraguay": 251.0, "algeria": 251.0, "scotland": 251.0, "egypt": 251.0,
            "australia": 501.0, "cape verde": 501.0, "curacao": 501.0, "dr congo": 501.0,
            "haiti": 501.0, "iran": 501.0, "iraq": 501.0, "jordan": 501.0, "new zealand": 501.0,
            "panama": 501.0, "qatar": 501.0, "saudi arabia": 501.0, "south africa": 501.0,
            "tunisia": 501.0, "uzbekistan": 501.0, "czechia": 501.0, "bosnia  herzegovina": 501.0,
            "south korea": 501.0
        };

        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "United States"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curaçao", "Bosnia-Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czechia", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        function normalizeName(name) {
            return String(name || "").toLowerCase().replace(/[^\w\s]/g, "").replace(/\s+/g, " ").trim();
        }

        function buildProxyUrl(targetUrl, reqHeaders = {}) {
            let url = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;
            for (const [key, value] of Object.entries(reqHeaders)) {
                url += `&reqHeaders=${encodeURIComponent(`${key}:${value}`)}`;
            }
            return url;
        }

        function getOwner(teamName) {
            const t = normalizeName(teamName);
            const found = roster.find(p => p.countries.some(c => t.includes(normalizeName(c))));
            return found ? found.name : "Unowned";
        }

        function getOdds(teamName) {
            return oddsMap[normalizeName(teamName)] || null;
        }

        function renderStats(standings) {
            const container = document.getElementById('stats-table');
            container.innerHTML = "";
            standings.forEach(group => {
                container.innerHTML += `<h3 class="text-xs font-bold text-slate-500 uppercase mt-4 mb-2">${group.group || "TOTAL"}</h3>`;
                group.table.forEach(team => {
                    const teamName = team.team?.name || "Unknown";
                    const odds = getOdds(teamName);
                    const winPercent = odds ? `${(100 / odds).toFixed(1)}%` : "N/A";

                    container.innerHTML += `
                        <div class="flex justify-between items-center gap-3 text-sm py-1 border-b border-slate-800/50">
                            <div>
                                <div class="font-medium">${teamName}</div>
                                <div class="text-[10px] text-amber-500 font-bold">Owner: ${getOwner(teamName)}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-emerald-400 font-bold">${team.points ?? 0}pts</div>
                                <div class="text-blue-400 font-mono text-xs">Win: ${winPercent}</div>
                            </div>
                        </div>`;
                });
            });
        }

        async function init() {
            const proxyHeaders = { "Accept": "application/json", "X-Auth-Token": FOOTBALL_KEY };
            try {
                const res = await fetch(buildProxyUrl("https://api.football-data.org/v4/competitions/WC/standings", proxyHeaders));
                const data = await res.json();
                renderStats(data.standings || []);
            } catch (e) {
                document.getElementById('stats-table').innerHTML = "Failed to load standings.";
            }
        }
        init();
    </script>
</body>
</html>

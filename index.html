<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Sweepstake Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#020617; color:white; font-family: sans-serif; }
.card { background: rgba(30,41,59,0.6); padding:10px; border-radius:10px; margin-bottom:8px; }
.small { font-size:12px; color:#94a3b8; }
</style>
</head>

<body class="p-4">

<h1 class="text-2xl font-bold mb-4">⚽ WC Sweepstake Dashboard</h1>

<div class="grid grid-cols-3 gap-4">

    <div>
        <h2 class="text-amber-400 font-bold mb-2">Leaderboard</h2>
        <div id="leaderboard"></div>
    </div>

    <div>
        <h2 class="text-blue-400 font-bold mb-2">Matches</h2>
        <div id="matches"></div>
    </div>

    <div>
        <h2 class="text-emerald-400 font-bold mb-2">Odds</h2>
        <div id="odds"></div>
    </div>

</div>

<script>

const proxy = "https://api.allorigins.win/raw?url=";

const FOOTBALL_KEY = "55a93c4b0f5142c4bfa22b58edbc5177";
const ODDS_KEY = "0505e1fe83a9649a8048acec4cb62fd7";

/* ---------------- FULL ROSTER ---------------- */
const roster = [
    { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
    { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
    { name: "Alex", countries: ["Canada", "Haiti", "USA", "United States"] },
    { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
    { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea", "Korea Republic"] },
    { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast", "Cote d'Ivoire"] },
    { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
    { name: "Elijah", countries: ["South Africa", "France", "Congo DR", "DR Congo"] },
    { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
    { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
    { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
    { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
    { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
    { name: "Edwyn", countries: ["Curacao", "Curaçao", "Bosnia and Herzegovina", "Paraguay"] },
    { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
    { name: "Joel", countries: ["England", "Spain", "Austria"] }
];

function norm(x){
    return (x||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
}

let oddsMap = {};

/* ---------------- ODDS ---------------- */
async function loadOdds(){
    const url =
    `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${ODDS_KEY}&regions=uk&markets=outrights`;

    const res = await fetch(proxy + encodeURIComponent(url));
    const data = await res.json();

    oddsMap = {};

    const outcomes =
        data?.[0]?.bookmakers?.[0]?.markets?.[0]?.outcomes || [];

    outcomes.forEach(o=>{
        oddsMap[norm(o.name)] = o.price;
    });
}

/* ---------------- MATCHES ---------------- */
async function loadMatches(){
    const url = "https://api.football-data.org/v4/competitions/WC/matches";

    const res = await fetch(proxy + encodeURIComponent(url), {
        headers: { "X-Auth-Token": FOOTBALL_KEY }
    });

    return await res.json();
}

/* ---------------- OWNER FIX ---------------- */
function getOwner(team){
    const t = norm(team);

    const found = roster.find(r =>
        r.countries.some(c =>
            t.includes(norm(c)) || norm(c).includes(t)
        )
    );

    return found ? found.name : "Unowned";
}

/* ---------------- LEADERBOARD ---------------- */
function renderLeaderboard(matches){
    let pts = {};
    roster.forEach(r=>pts[r.name]=0);

    (matches||[]).forEach(m=>{
        const h = roster.find(r=>r.countries.some(c=>norm(m.homeTeam.name).includes(norm(c))))?.name;
        const a = roster.find(r=>r.countries.some(c=>norm(m.awayTeam.name).includes(norm(c))))?.name;

        const hs = m.score?.fullTime?.home;
        const as = m.score?.fullTime?.away;

        if(hs==null || as==null) return;

        if(hs>as && h) pts[h]+=3;
        else if(as>hs && a) pts[a]+=3;
    });

    document.getElementById("leaderboard").innerHTML =
        Object.entries(pts)
        .sort((a,b)=>b[1]-a[1])
        .map(p=>`
            <div class="card">
                <b>${p[0]}</b><br>
                <span class="small">${p[1]} pts</span>
            </div>
        `).join("");
}

/* ---------------- MATCHES ---------------- */
function renderMatches(matches){
    document.getElementById("matches").innerHTML =
        (matches||[]).slice(0,10).map(m=>`
            <div class="card small">
                ${m.homeTeam.name} vs ${m.awayTeam.name}<br>
                <b>${m.score?.fullTime?.home ?? "-"} : ${m.score?.fullTime?.away ?? "-"}</b>
            </div>
        `).join("");
}

/* ---------------- ODDS ---------------- */
function renderOdds(){
    document.getElementById("odds").innerHTML =
        Object.entries(oddsMap).slice(0,10).map(([k,v])=>`
            <div class="card small">
                ${k} → <b>${v}</b>
            </div>
        `).join("");
}

/* ---------------- INIT ---------------- */
async function init(){

    await loadOdds();
    renderOdds();

    const matchesData = await loadMatches();
    const matches = matchesData?.matches || [];

    renderMatches(matches);
    renderLeaderboard(matches);
}

init();

</script>

</body>
</html>

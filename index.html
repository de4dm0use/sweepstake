<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 Sweepstake</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.glass { background: rgba(30,41,59,0.7); backdrop-filter: blur(10px); }
</style>
</head>

<body class="bg-slate-950 text-white p-4">

<div class="grid grid-cols-1 lg:grid-cols-12 gap-4">

  <div class="lg:col-span-3 glass p-3 rounded-xl">
    <h2 class="text-amber-400 font-bold mb-2">Leaderboard</h2>
    <div id="leaderboard"></div>
  </div>

  <div class="lg:col-span-6 glass p-3 rounded-xl">
    <h2 class="text-blue-400 font-bold mb-2">Matches</h2>
    <div id="matches"></div>
  </div>

  <div class="lg:col-span-3 glass p-3 rounded-xl h-[80vh] overflow-y-auto">
    <h2 class="text-emerald-400 font-bold mb-2">Stats</h2>
    <div id="stats"></div>
  </div>

</div>

<script>
/* ---------------- KEYS ---------------- */
const FOOTBALL_KEY = "55a93c4b0f5142c4bfa22b58edbc5177";
const ODDS_KEY = "0505e1fe83a9649a8048acec4cb62fd7";

/* ---------------- CORS PROXY ---------------- */
const proxy = "https://api.codetabs.com/v1/proxy?quest=";

/* ---------------- DATA ---------------- */
let odds = {};

/* ---------------- ROSTER ---------------- */
const roster = [
  { name:"Archie", countries:["Argentina","Cape Verde","Iraq"] },
  { name:"Liam", countries:["Algeria","Iran","Australia"] },
  { name:"Alex", countries:["Canada","Haiti","USA"] },
  { name:"Christopher", countries:["Colombia","Turkey","Senegal"] },
  { name:"Stan", countries:["Ecuador","Saudi Arabia","South Korea"] },
  { name:"Isaac", countries:["Uzbekistan","Switzerland","Ivory Coast"] },
  { name:"Mason", countries:["Egypt","Germany","New Zealand"] },
  { name:"Elijah", countries:["South Africa","France","Congo DR"] },
  { name:"Owen", countries:["Morocco","Netherlands","Tunisia"] },
  { name:"Oscar W", countries:["Ghana","Panama","Norway"] },
  { name:"Thomas", countries:["Mexico","Portugal","Scotland"] },
  { name:"Robin", countries:["Croatia","Qatar","Sweden"] },
  { name:"Ethan", countries:["Belgium","Brazil","Japan"] },
  { name:"Edwyn", countries:["Curacao","Bosnia and Herzegovina","Paraguay"] },
  { name:"Oscar L", countries:["Czech Republic","Uruguay","Jordan"] },
  { name:"Joel", countries:["England","Spain","Austria"] }
];

function owner(team){
  team = team.toLowerCase();
  const found = roster.find(p =>
    p.countries.some(c => team.includes(c.toLowerCase()))
  );
  return found ? found.name : "Unowned";
}

/* ---------------- MATCHES ---------------- */
function renderMatches(data){
  const el = document.getElementById("matches");
  el.innerHTML = "";

  if(!data?.matches){
    el.innerHTML = "<div class='text-slate-400'>No matches loaded</div>";
    return;
  }

  data.matches.slice(0,20).forEach(m=>{
    el.innerHTML += `
      <div class="border-b border-slate-800 py-2 text-sm">
        ${m.homeTeam.name} vs ${m.awayTeam.name}
        <div class="text-xs text-slate-400">${m.status}</div>
      </div>
    `;
  });
}

/* ---------------- LEADERBOARD ---------------- */
function renderLeaderboard(data){
  const el = document.getElementById("leaderboard");
  el.innerHTML = "";

  if(!data?.standings) return;

  let all = [];

  data.standings.forEach(g=>{
    g.table.forEach(t=>{
      all.push({
        name: t.team.name,
        pts: t.points || 0
      });
    });
  });

  all.sort((a,b)=>b.pts-a.pts);

  all.slice(0,10).forEach(p=>{
    el.innerHTML += `
      <div class="flex justify-between text-sm border-b border-slate-800 py-1">
        <span>${p.name}</span>
        <span class="text-emerald-400">${p.pts}</span>
      </div>
    `;
  });
}

/* ---------------- STATS ---------------- */
function renderStats(data){
  const el = document.getElementById("stats");
  el.innerHTML = "";

  if(!data) return;

  data.forEach(g=>{
    el.innerHTML += `<div class="text-xs text-slate-400 mt-2">${g.group}</div>`;

    g.table.forEach(t=>{
      el.innerHTML += `
        <div class="text-sm border-b border-slate-800 py-1">
          <div>${t.team.name}</div>
          <div class="text-xs text-amber-400">
            Owner: ${owner(t.team.name)}
          </div>
        </div>
      `;
    });
  });
}

/* ---------------- INIT ---------------- */
async function init(){

  try{
    /* ODDS */
    const oddsURL =
      `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup/odds/?apiKey=${ODDS_KEY}&regions=uk&markets=h2h`;

    const o = await fetch(proxy + encodeURIComponent(oddsURL));
    const od = await o.json();

    const outcomes =
      od?.[0]?.bookmakers?.[0]?.markets?.[0]?.outcomes || [];

    outcomes.forEach(x=>{
      odds[x.name.toLowerCase()] = x.price;
    });

  }catch(e){
    console.log("odds failed", e);
  }

  try{
    /* MATCHES */
    const m = await fetch(
      proxy + encodeURIComponent(
        "https://api.football-data.org/v4/competitions/WC/matches"
      )
    );
    const md = await m.json();
    renderMatches(md);

    /* STANDINGS */
    const s = await fetch(
      proxy + encodeURIComponent(
        "https://api.football-data.org/v4/competitions/WC/standings"
      )
    );
    const sd = await s.json();

    renderLeaderboard(sd);
    renderStats(sd?.standings);

  }catch(e){
    console.log("api failed", e);
  }
}

init();
</script>

</body>
</html>

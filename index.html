<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-black text-amber-400">🏆 2026 Sweepstakes</h1>
            <button onclick="fetchMatches()" class="bg-emerald-600 px-6 py-2 rounded-lg font-bold">Sync Data</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div id="fixtures-container" class="lg:col-span-3 space-y-2">
                <div class="text-center text-slate-500">Click "Sync Data" to see the upcoming schedule.</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchMatches() {
            const container = document.getElementById('fixtures-container');
            container.innerHTML = "Loading...";

            try {
                // We use a CORS proxy to bypass the browser block
                const response = await fetch("https://corsproxy.io/?https://api.football-data.org/v4/competitions/WC/matches");
                const data = await response.json();
                
                // IMPORTANT: Check your browser console (F12) to see this output
                console.log("API Response:", data); 

                if (!data.matches || data.matches.length === 0) {
                    container.innerHTML = "No matches found in API response. The API might not have 2026 data loaded.";
                    return;
                }

                renderUI(data.matches);
            } catch (err) {
                container.innerHTML = "Sync Error. Check console for details.";
                console.error(err);
            }
        }

        function renderUI(matches) {
            const container = document.getElementById('fixtures-container');
            container.innerHTML = ""; // Clear loader

            matches.forEach(m => {
                const homeScore = m.score.fullTime.home !== null ? m.score.fullTime.home : "-";
                const awayScore = m.score.fullTime.away !== null ? m.score.fullTime.away : "-";
                const status = m.status;

                container.innerHTML += `
                    <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                        <div class="w-1/3 text-right font-bold">${m.homeTeam.name}</div>
                        <div class="px-4 py-1 bg-black rounded font-mono">${homeScore} : ${awayScore}</div>
                        <div class="w-1/3 text-left font-bold">${m.awayTeam.name}</div>
                        <div class="text-xs text-slate-500">${status}</div>
                    </div>`;
            });
        }
    </script>
</body>
</html>

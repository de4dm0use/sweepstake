<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WC Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-6">

<h1 class="text-2xl font-bold mb-6">World Cup Dashboard</h1>

<div class="grid grid-cols-3 gap-4">

    <div>
        <h2 class="text-amber-400 font-bold mb-2">Leaderboard</h2>
        <div id="leaderboard"></div>
    </div>

    <div>
        <h2 class="text-blue-400 font-bold mb-2">Matches</h2>
        <div id="matches"></div>
    </div>

    <div>
        <h2 class="text-emerald-400 font-bold mb-2">Stats</h2>
        <div id="stats"></div>
    </div>

</div>

<script>
const API = "http://localhost:3000/api"; // change this when deployed

const roster = [
    { name:"Alex", countries:["USA"] },
    { name:"Edwyn", countries:["Curacao"] }
];

function norm(n){
    return (n||"").toLowerCase();
}

async function load(){

    const matches = await fetch(API + "/matches").then(r=>r.json());
    const stats = await fetch(API + "/standings").then(r=>r.json());

    // ---------------- MATCHES ----------------
    document.getElementById("matches").innerHTML =
        (matches.matches||[]).slice(0,8).map(m=>`
            <div class="text-sm border-b border-slate-800 py-1">
                ${m.homeTeam.name} vs ${m.awayTeam.name}
            </div>
        `).join("");

    // ---------------- STATS ----------------
    document.getElementById("stats").innerHTML =
        (stats.standings||[]).slice(0,2).map(g=>`
            <div class="text-xs mb-3">
                <div class="text-slate-400">${g.group}</div>
                ${g.table.map(t=>`
                    <div>${t.team.name} - ${t.points}</div>
                `).join("")}
            </div>
        `).join("");

    // ---------------- LEADERBOARD ----------------
    let points = {};
    roster.forEach(r => points[r.name] = 0);

    (matches.matches||[]).forEach(m => {
        const h = roster.find(r => r.countries.some(c =>
            norm(m.homeTeam.name).includes(norm(c))
        ))?.name;

        const a = roster.find(r => r.countries.some(c =>
            norm(m.awayTeam.name).includes(norm(c))
        ))?.name;

        if(m.score?.fullTime?.home > m.score?.fullTime?.away && h) points[h] += 3;
        else if(m.score?.fullTime?.away > m.score?.fullTime?.home && a) points[a] += 3;
    });

    document.getElementById("leaderboard").innerHTML =
        Object.entries(points)
            .sort((a,b)=>b[1]-a[1])
            .map(p=>`<div>${p[0]} - ${p[1]} pts</div>`)
            .join("");
}

load();
</script>

</body>
</html>

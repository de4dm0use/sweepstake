<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Sweepstakes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-black text-amber-400">🏆 2026 World Cup Sweepstakes</h1>
            <div class="flex gap-2">
                <input type="password" id="api-key-input" placeholder="Paste Auth Token..." 
                       class="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 w-64 text-sm focus:border-amber-400 outline-none">
                <button onclick="fetchMatches()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-lg font-bold">Sync</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2">📊 Leaderboard</h2>
                <table class="w-full text-sm">
                    <tbody id="leaderboard-body">
                        <tr><td class="text-slate-500 text-center py-10">Paste token & Sync...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="lg:col-span-2 space-y-4" id="fixtures-container">
                <div class="bg-slate-800 p-8 rounded-2xl text-center border border-slate-700">Waiting for sync...</div>
            </div>
        </div>
    </div>

    <script>
        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curacao", "Bosnia and Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        function getOwner(teamName) {
            const found = roster.find(p => p.countries.some(c => teamName.toLowerCase().includes(c.toLowerCase())));
            return found ? found.name : "Unowned";
        }

        async function fetchMatches() {
            const token = document.getElementById('api-key-input').value.trim();
            if (!token) return alert("Please enter your token!");
            
            const container = document.getElementById('fixtures-container');
            container.innerHTML = "Fetching...";

            try {
                // Using the CORS Proxy
                const response = await fetch("https://corsproxy.io/?https://api.football-data.org/v4/competitions/WC/matches", {
                    headers: { "X-Auth-Token": token }
                });
                
                if (!response.ok) throw new Error("API Limit reached or Invalid Key");
                const data = await response.json();
                renderUI(data.matches);
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="bg-red-900/20 p-6 rounded-xl border border-red-800 text-red-200">
                    <p class="font-bold">Sync Error:</p>
                    <p class="text-sm">The API is blocking the connection or the key is invalid. Try again later.</p>
                </div>`;
            }
        }

        function renderUI(matches) {
            let points = {};
            roster.forEach(r => points[r.name] = 0);

            let html = "";
            matches.filter(m => m.status === "FINISHED").forEach(m => {
                const ownerA = getOwner(m.homeTeam.name);
                const ownerB = getOwner(m.awayTeam.name);
                
                if (m.score.fullTime.home > m.score.fullTime.away) {
                    if (ownerA !== "Unowned") points[ownerA] += 3;
                } else if (m.score.fullTime.away > m.score.fullTime.home) {
                    if (ownerB !== "Unowned") points[ownerB] += 3;
                } else {
                    if (ownerA !== "Unowned") points[ownerA] += 1;
                    if (ownerB !== "Unowned") points[ownerB] += 1;
                }

                html += `<div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                    <div class="text-right w-1/3"><p class="font-bold">${m.homeTeam.name}</p><p class="text-[10px] text-slate-500">${ownerA}</p></div>
                    <div class="bg-black/30 px-4 py-1 rounded font-mono">${m.score.fullTime.home} : ${m.score.fullTime.away}</div>
                    <div class="text-left w-1/3"><p class="font-bold">${m.awayTeam.name}</p><p class="text-[10px] text-slate-500">${ownerB}</p></div>
                </div>`;
            });

            document.getElementById('fixtures-container').innerHTML = html;

            // Leaderboard
            const sorted = Object.entries(points).sort((a,b) => b[1] - a[1]);
            document.getElementById('leaderboard-body').innerHTML = sorted.map(p => `
                <tr class="border-b border-slate-700/50">
                    <td class="py-3 font-semibold">${p[0]}</td>
                    <td class="text-right font-black text-amber-400">${p[1]} pts</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>

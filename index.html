<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sweepstake Live</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1020;
  color: white;
}

header {
  padding: 16px;
  text-align: center;
  background: #111a33;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 16px;
  display: grid;
  gap: 16px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>🏆 Sweepstake System</header>

<div class="container">

  <div class="card">
    <h2>Leaderboard</h2>
    <div id="board">Loading...</div>
  </div>

  <div class="card">
    <h2>Fixtures</h2>
    <div id="fixtures">Loading...</div>
  </div>

</div>

<script>

/////////////////////////////////////////////////////
// SUPABASE INIT (SAFE + NO DUPLICATES)
/////////////////////////////////////////////////////

const supabaseUrl = "https://cvytbxrkgeitzvimpmea.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2eXRieHJrZ2VpdHp2aW1wbWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODY4NDEsImV4cCI6MjA5NjE2Mjg0MX0.firN5TH54_LoiMtlJDoef6AKWAIaRlU7JQQRgooyuXM";

// IMPORTANT: prevent redeclare crashes
window.supabaseClient = window.supabaseClient || 
  window.supabase.createClient(supabaseUrl, supabaseKey);

const supabase = window.supabaseClient;

console.log("Supabase loaded");

/////////////////////////////////////////////////////
// FIXTURES
/////////////////////////////////////////////////////

const FIXTURES = [
  { home: "Argentina", away: "Iraq", stage: "Group A", date: "2026-06-10" },
  { home: "England", away: "Spain", stage: "Group B", date: "2026-06-11" },
  { home: "Brazil", away: "Japan", stage: "Group C", date: "2026-06-12" },
  { home: "France", away: "Germany", stage: "Group D", date: "2026-06-13" },
  { home: "Portugal", away: "Netherlands", stage: "Group E", date: "2026-06-14" }
];

function loadFixtures() {
  document.getElementById("fixtures").innerHTML =
    FIXTURES.map(f => `
      <div class="row">
        <div>
          <b>${f.home}</b> vs <b>${f.away}</b>
          <div class="small">${f.stage} • ${f.date}</div>
        </div>
        <div>-</div>
      </div>
    `).join("");
}

/////////////////////////////////////////////////////
// LEADERBOARD
/////////////////////////////////////////////////////

async function loadLeaderboard() {

  const board = document.getElementById("board");
  board.innerHTML = "Loading...";

  const { data, error } = await supabase
    .from("leaderboard")
    .select("*");

  console.log("data:", data);
  console.log("error:", error);

  if (error) {
    board.innerHTML = "❌ Supabase error (check console)";
    return;
  }

  if (!data || data.length === 0) {
    board.innerHTML = "No players yet";
    return;
  }

  data.sort((a, b) => b.score - a.score);

  board.innerHTML = data.map((p, i) => `
    <div class="row">
      <span>#${i + 1} ${p.player}</span>
      <span>${p.score}</span>
    </div>
  `).join("");
}

/////////////////////////////////////////////////////
// START
/////////////////////////////////////////////////////

loadFixtures();
loadLeaderboard();
setInterval(loadLeaderboard, 3000);
/////////////////////////////////////////////////////
// 3. LEADERBOARD (SUPABASE LIVE)
/////////////////////////////////////////////////////

async function loadLeaderboard() {

  const board = document.getElementById("board");
  board.innerHTML = "Loading...";

  const { data, error } = await supabase
    .from("leaderboard")
    .select("*");

  console.log("Leaderboard data:", data);
  console.log("Leaderboard error:", error);

  if (error) {
    board.innerHTML = "❌ Supabase error (check console)";
    return;
  }

  if (!data || data.length === 0) {
    board.innerHTML = "No players yet";
    return;
  }

  data.sort((a, b) => b.score - a.score);

  board.innerHTML = data.map((p, i) => `
    <div class="row">
      <span>#${i + 1} ${p.player}</span>
      <span>${p.score}</span>
    </div>
  `).join("");
}

/////////////////////////////////////////////////////
// 4. INIT APP
/////////////////////////////////////////////////////

loadFixtures();
loadLeaderboard();

setInterval(loadLeaderboard, 3000);

</script>

</body>
</html>

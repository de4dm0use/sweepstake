<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC 2026 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-10">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <div class="lg:col-span-1">
            <h2 class="text-2xl font-black mb-6 text-amber-400">🏆 Leaderboard</h2>
            <div id="leaderboard" class="glass p-6 rounded-3xl border border-slate-800 shadow-2xl">
                </div>
        </div>

        <div class="lg:col-span-3">
            <h2 class="text-2xl font-black mb-6 text-blue-400">⚽ Match Schedule</h2>
            <div id="match-table" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        const roster = [
            { name: "Archie", countries: ["Argentina", "Cape Verde", "Iraq"] },
            { name: "Liam", countries: ["Algeria", "Iran", "Australia"] },
            { name: "Alex", countries: ["Canada", "Haiti", "USA"] },
            { name: "Christopher", countries: ["Colombia", "Turkey", "Senegal"] },
            { name: "Stan", countries: ["Ecuador", "Saudi Arabia", "South Korea"] },
            { name: "Isaac", countries: ["Uzbekistan", "Switzerland", "Ivory Coast"] },
            { name: "Mason", countries: ["Egypt", "Germany", "New Zealand"] },
            { name: "Elijah", countries: ["South Africa", "France", "Congo DR"] },
            { name: "Owen", countries: ["Morocco", "Netherlands", "Tunisia"] },
            { name: "Oscar W", countries: ["Ghana", "Panama", "Norway"] },
            { name: "Thomas", countries: ["Mexico", "Portugal", "Scotland"] },
            { name: "Robin", countries: ["Croatia", "Qatar", "Sweden"] },
            { name: "Ethan", countries: ["Belgium", "Brazil", "Japan"] },
            { name: "Edwyn", countries: ["Curacao", "Bosnia and Herzegovina", "Paraguay"] },
            { name: "Oscar L", countries: ["Czech Republic", "Uruguay", "Jordan"] },
            { name: "Joel", countries: ["England", "Spain", "Austria"] }
        ];

        function getOwner(teamName) {
            const found = roster.find(p => p.countries.some(c => teamName.toLowerCase().includes(c.toLowerCase())));
            return found ? found.name : "Unowned";
        }

        async function init() {
            // Your working fetch call here
            const res = await fetch("https://corsproxy.io/?https://api.football-data.org/v4/competitions/WC/matches");
            const data = await res.json();
            
            let points = {};
            roster.forEach(r => points[r.name] = 0);

            // Populate Table
            const table = document.getElementById('match-table');
            data.matches.forEach(m => {
                const home = m.homeTeam.name;
                const away = m.awayTeam.name;
                const ownerH = getOwner(home);
                const ownerA = getOwner(away);
                
                // Score logic
                if (m.status === "FINISHED") {
                    if (m.score.fullTime.home > m.score.fullTime.away) points[ownerH] += 3;
                    else if (m.score.fullTime.away > m.score.fullTime.home) points[ownerA] += 3;
                    else { points[ownerH] += 1; points[ownerA] += 1; }
                }

                table.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex items-center justify-between border border-slate-800 hover:border-slate-600 transition">
                        <div class="w-1/3 text-right">
                            <div class="font-bold">${home}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${ownerH}</div>
                        </div>
                        <div class="text-xl font-mono font-black mx-4 bg-slate-950 px-4 py-1 rounded-lg">
                            ${m.score.fullTime.home ?? '-'} : ${m.score.fullTime.away ?? '-'}
                        </div>
                        <div class="w-1/3 text-left">
                            <div class="font-bold">${away}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${ownerA}</div>
                        </div>
                    </div>
                `;
            });

            // Populate Leaderboard
            const lb = document.getElementById('leaderboard');
            const sorted = Object.entries(points).sort((a,b) => b[1] - a[1]);
            lb.innerHTML = sorted.map((p, i) => `
                <div class="flex justify-between py-3 border-b border-slate-800 last:border-0">
                    <span class="${i<3 ? 'text-amber-400 font-bold' : ''}">${i+1}. ${p[0]}</span>
                    <span class="font-black">${p[1]} pts</span>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
